<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="emeraldGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10B981"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <filter id="subtle-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#064E3B" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Beautiful circular base with the emerald gradient -->
  <circle cx="256" cy="256" r="240" fill="url(#emeraldGrad)" filter="url(#subtle-shadow)"/>
  <!-- Smooth inner ring for a highly professional, cohesive look -->
  <circle cx="256" cy="256" r="224" stroke="rgba(255, 255, 255, 0.15)" stroke-width="6"/>
  <!-- Premium 'SK' typography centered perfectly -->
  <text x="256" y="258" 
        font-family="'Outfit', 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif" 
        font-size="200" 
        font-weight="800" 
        fill="#FFFFFF" 
        text-anchor="middle" 
        dominant-baseline="central"
        letter-spacing="-6">SK</text>
</svg>
